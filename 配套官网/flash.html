<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>征途怀旧版 - 浮动入口</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
html,body{
  margin:0;padding:0;
  background:#0b1020;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  font-family:-apple-system,Segoe UI,Roboto,"PingFang SC",sans-serif;
}
.container{
  position:relative;
  width:475px;
  height:170px;
  max-width:475px;
  max-height:170px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}
.container img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.actions{
  position:absolute;
  left:0; right:0; bottom:8px;
  display:flex;
  justify-content:center;
  gap:10px;
  pointer-events:none;
}
.actions a{
  pointer-events:auto;
  text-decoration:none;
  font-weight:700;
  font-size:13px;
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  box-shadow:0 4px 10px rgba(0,0,0,.35);
  transition:transform .15s ease, filter .15s ease;
  animation:pulse 3s infinite ease-in-out;
}
.actions a:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn-reg{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-pay{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.btn-lottery{background:linear-gradient(135deg,#f59e0b,#d97706);}

/* 自动闪光循环动画 */
@keyframes pulse {
  0%,100% {box-shadow:0 0 10px rgba(255,255,255,0.2);}
  50% {box-shadow:0 0 18px rgba(255,255,255,0.6);}
}
</style>
</head>
<body>
  <div class="container">
    <!-- 背景图（推荐 475×170） -->
    <img src="img/475x170.jpg" alt="征途怀旧版" />

    <!-- 底部浮动按钮 -->
    <div class="actions">
      <a href="http://pay.zt989.com/register.html" target="_blank" rel="noopener noreferrer" class="btn-reg">注册</a>
      <a href="http://pay.zt989.com/recharge.html" target="_blank" rel="noopener noreferrer" class="btn-pay">充值</a>
      <a href="http://pay.zt989.com/lottery.html" target="_blank" rel="noopener noreferrer" class="btn-lottery">抽奖</a>
    </div>
  </div>
</body>
</html>
