<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>征途私服 - 重设密码 - 征途</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans","PingFang SC","Microsoft Yahei",sans-serif;margin:0;padding:24px;background:#f7f7fb}
.card{max-width:720px;margin:0 auto;background:#fff;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:24px}
h1{margin:0 0 16px 0;font-size:22px}
label{display:block;margin-top:12px;font-weight:600}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-top:6px;font-size:15px}
.row{display:flex;gap:8px;align-items:flex-end}
.row input{flex:1}
.row button{width:130px;white-space:nowrap}
button{padding:10px 14px;border:0;border-radius:10px;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;transition:background .2s}
button:hover{background:#2563eb}
button.secondary{background:#1118270f;color:#111827;border:1px solid #e5e7eb}
button.secondary:hover{background:#f3f4f6}
.tip{background:#ecfdf5;color:#065f46;padding:10px;border-radius:8px;margin-top:12px;font-size:14px;display:none}
pre{background:#0b1020;color:#e5e7eb;padding:12px;border-radius:10px;overflow:auto;max-height:260px;font-size:13px;margin-top:16px}
</style>
</head>
<body>
<div class="card">
<h1>重设密码</h1>

<label>邮箱（作为账号）</label>
<input id="email" placeholder="请输入您的注册邮箱"/>

<label>邮箱验证码</label>
<div class="row">
  <input id="code" placeholder="请输入验证码"/>
  <button class="secondary" id="btnSend">发送验证码</button>
</div>

<label>新密码</label>
<input id="newpass" type="password" placeholder="请输入新密码（明文存储）"/>

<div class="row" style="margin-top:20px">
  <button id="btnReset">重设密码</button>
</div>

<div class="tip" id="tip"></div>
<pre id="out">{ "提示": "操作结果会显示在这里" }</pre>

<div class="footer-links" style="margin-top:24px;display:flex;gap:10px;">
  <a href="/index.html" style="flex:1;text-align:center;text-decoration:none;padding:12px;border-radius:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;">🏠 返回首页</a>
  <a href="/recharge.html" style="flex:1;text-align:center;text-decoration:none;padding:12px;border-radius:10px;font-weight:700;background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;">💰 充值中心</a>
  <a href="/lottery.html" style="flex:1;text-align:center;text-decoration:none;padding:12px;border-radius:10px;font-weight:700;background:#fff7ed;color:#92400e;border:1px solid #fed7aa;">🎁 抽奖中心</a>
</div>

<script>
function show(o){document.getElementById('out').textContent = JSON.stringify(o,null,2);}
function val(id){return document.getElementById(id).value.trim();}
function tip(msg, ok=true){
  const t = document.getElementById('tip');
  t.style.display = 'block';
  t.style.background = ok ? '#ecfdf5' : '#fef2f2';
  t.style.color = ok ? '#065f46' : '#b91c1c';
  t.textContent = msg;
}

document.getElementById('btnSend').onclick = async function(){
  const email = val('email');
  if(!email){ return tip('请输入邮箱', false); }
  const fd = new FormData();
  fd.append('action', 'send_code');
  fd.append('email', email);
  const r = await fetch('reset_password_backend.php', { method: 'POST', body: fd });
  const j = await r.json().catch(()=>({ok:false,msg:'返回不是JSON'}));
  show(j);
  tip(j.ok ? '验证码已发送，请查收邮箱' : j.msg, j.ok);
};

document.getElementById('btnReset').onclick = async function(){
  const email = val('email'), code = val('code'), passwd = val('newpass');
  if(!email || !code || !passwd) return tip('请填写完整信息', false);
  const fd = new FormData();
  fd.append('action','reset_pass');
  fd.append('email', email);
  fd.append('code', code);
  fd.append('passwd', passwd);
  const r = await fetch('reset_password_backend.php', {method:'POST', body:fd});
  const j = await r.json().catch(()=>({ok:false,msg:'返回不是JSON'}));
  show(j);
  tip(j.msg, j.ok);
};
</script>
</body>
</html>
